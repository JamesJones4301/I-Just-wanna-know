<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>I Just Wanna Know</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --ink: #111827;
      --muted: #64748b;
      --line: #dbe3ef;
      --brand: #0f172a;
      --brand-2: #1d4ed8;
      --danger: #b91c1c;
      --good: #166534;
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef3ff 0%, var(--bg) 38%, #ffffff 100%);
      color: var(--ink);
    }

    .page {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 16px 42px;
    }

    .hero {
      padding: 26px 4px 18px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      background: #e0ebff;
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .02em;
    }

    h1 {
      margin: 16px 0 8px;
      font-size: 34px;
      line-height: 1.08;
      color: var(--brand);
    }

    .intro {
      margin: 0 auto;
      max-width: 560px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.5;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, .08);
      overflow: hidden;
    }

    form {
      padding: 20px;
    }

    .section {
      padding: 18px 0;
      border-bottom: 1px solid var(--line);
    }

    .section:first-child {
      padding-top: 0;
    }

    .section:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 18px;
      color: var(--brand);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    @media (min-width: 680px) {
      .grid.two {
        grid-template-columns: 1fr 1fr;
      }
    }

    label {
      display: block;
      margin: 0 0 7px;
      color: #334155;
      font-size: 14px;
      font-weight: 700;
    }

    input,
    select,
    textarea,
    button {
      font: inherit;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 48px;
      padding: 12px 13px;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      background: #ffffff;
      color: var(--ink);
      outline: none;
      font-size: 16px;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
      line-height: 1.45;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--brand-2);
      box-shadow: 0 0 0 4px rgba(29, 78, 216, .12);
    }

    .actions {
      display: grid;
      gap: 12px;
      padding-top: 18px;
    }

    button {
      width: 100%;
      min-height: 54px;
      border: 0;
      border-radius: 16px;
      background: var(--brand-2);
      color: #ffffff;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
    }

    button:disabled {
      opacity: .65;
      cursor: not-allowed;
    }

    .status {
      display: none;
      padding: 13px 14px;
      border-radius: 14px;
      font-size: 15px;
      line-height: 1.4;
    }

    .status.show {
      display: block;
    }

    .status.good {
      background: #dcfce7;
      color: var(--good);
      border: 1px solid #bbf7d0;
    }

    .status.bad {
      background: #fee2e2;
      color: var(--danger);
      border: 1px solid #fecaca;
    }

    .fine-print {
      margin: 14px 4px 0;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <span class="badge">Mobile Backup Form</span>
      <h1>I Just Wanna Know</h1>
      <p class="intro">Answer these quick questions. This page works on iPhone, Android, tablet, and desktop.</p>
    </section>

    <section class="card" aria-label="I Just Wanna Know form">
      <form id="requestForm">
        <section class="section">
          <h2 class="section-title">Your Information</h2>
          <div class="grid two">
            <div>
              <label for="fullName">Name *</label>
              <input id="fullName" name="fullName" type="text" autocomplete="name" required />
            </div>
            <div>
              <label for="email">Email *</label>
              <input id="email" name="email" type="email" autocomplete="email" required />
            </div>
          </div>
        </section>

        <section class="section">
          <h2 class="section-title">Questions</h2>
          <div class="grid">
            <div>
              <label for="favoriteColor">1. What is your favorite color? *</label>
              <input id="favoriteColor" name="favoriteColor" type="text" required />
            </div>
            <div>
              <label for="savorySnack">2. What is your savory snack? *</label>
              <input id="savorySnack" name="savorySnack" type="text" required />
            </div>
            <div>
              <label for="likesCarrots">3. Do you like carrots? *</label>
              <select id="likesCarrots" name="likesCarrots" required>
                <option value="">Select one</option>
                <option>Yes</option>
                <option>No</option>
                <option>Sometimes</option>
              </select>
            </div>
            <div>
              <label for="favoriteDrink">4. What is your favorite drink? *</label>
              <input id="favoriteDrink" name="favoriteDrink" type="text" required />
            </div>
            <div>
              <label for="favoriteNonSavorySnack">5. What is your favorite non-savory snack? *</label>
              <input id="favoriteNonSavorySnack" name="favoriteNonSavorySnack" type="text" required />
            </div>
            <div>
              <label for="babyToothStory">6. What is the craziest way you have lost a baby tooth? *</label>
              <textarea id="babyToothStory" name="babyToothStory" required></textarea>
            </div>
            <div>
              <label for="favoriteHeroCharacter">7. What is your favorite hero or character? *</label>
              <input id="favoriteHeroCharacter" name="favoriteHeroCharacter" type="text" required />
            </div>
          </div>
        </section>

        <section class="section">
          <div class="actions">
            <button id="submitButton" type="submit">Submit Answers</button>
            <div id="status" class="status" role="status" aria-live="polite"></div>
          </div>
        </section>
      </form>
    </section>

    <p class="fine-print">This backup form sends answers to the response spreadsheet without requiring Google Forms to load.</p>
  </main>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzRQsryZtkuKZY7oYklJzxwObnBLYR9bmgSq5xVTdqSxXy_W54CegO1JVgGLRnh0iAeGQ/exec';
    const form = document.getElementById('requestForm');
    const statusBox = document.getElementById('status');
    const submitButton = document.getElementById('submitButton');

    function showStatus(type, message) {
      statusBox.className = 'status show ' + type;
      statusBox.textContent = message;
    }

    function getPayload() {
      const data = new FormData(form);
      return {
        fullName: data.get('fullName') || '',
        email: data.get('email') || '',
        favoriteColor: data.get('favoriteColor') || '',
        savorySnack: data.get('savorySnack') || '',
        likesCarrots: data.get('likesCarrots') || '',
        favoriteDrink: data.get('favoriteDrink') || '',
        favoriteNonSavorySnack: data.get('favoriteNonSavorySnack') || '',
        babyToothStory: data.get('babyToothStory') || '',
        favoriteHeroCharacter: data.get('favoriteHeroCharacter') || '',
        source: 'Backup Web App'
      };
    }

    form.addEventListener('submit', async function(event) {
      event.preventDefault();

      submitButton.disabled = true;
      submitButton.textContent = 'Submitting...';
      showStatus('good', 'Sending your answers...');

      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify(getPayload())
        });

        form.reset();
        showStatus('good', 'Thank you. Your answers were submitted.');
      } catch (error) {
        showStatus('bad', 'The answers did not send. Please check your connection and try again.');
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = 'Submit Answers';
      }
    });
  </script>
</body>
</html>
